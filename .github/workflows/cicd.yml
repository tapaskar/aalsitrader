name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  NODE_VERSION: '20'

jobs:
  # Job 1: Lint & Test
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: |
          frontend/package-lock.json
          backend/package-lock.json
    
    # Frontend tests
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Lint frontend
      working-directory: ./frontend
      run: npm run lint
      
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
    
    # Backend tests
    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci
      
    - name: Build backend
      working-directory: ./backend
      run: npm run build:all
    
    # Unit tests
    - name: Install test dependencies
      working-directory: ./tests
      run: npm ci
      
    - name: Run unit tests
      working-directory: ./tests
      run: npm run test:unit -- --reporter=verbose
      
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./tests/coverage/unit/lcov.info
        flags: unittests
        name: codecov-umbrella

  # Job 2: Integration Tests
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    
    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install dependencies
      run: |
        cd backend && npm ci
        cd ../tests && npm ci
    
    - name: Build backend
      working-directory: ./backend
      run: npm run build:all
    
    - name: Start backend services
      run: |
        node backend/dist/websocket.js &
        node backend/dist/http.js &
        sleep 3
      env:
        DYNAMODB_ENDPOINT: http://localhost:8000
        CONNECTIONS_TABLE: connections
        ACTIVITIES_TABLE: activities
        AGENT_STATE_TABLE: agentState
        TRADES_TABLE: trades
        AWS_REGION: ap-south-1
        AWS_ACCESS_KEY_ID: test
        AWS_SECRET_ACCESS_KEY: test
    
    - name: Run integration tests
      working-directory: ./tests
      run: npm run test:integration -- --reporter=verbose
      env:
        DYNAMODB_ENDPOINT: http://localhost:8000
        API_URL: http://localhost:3000
        WS_ENDPOINT: ws://localhost:3001

  # Job 3: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, integration-test]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.6.0"
        terraform_wrapper: false
    
    - name: Deploy to Staging
      run: |
        export ENVIRONMENT=staging
        ./deploy.sh staging ${{ env.AWS_REGION }}

  # Job 4: Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, integration-test]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.6.0"
        terraform_wrapper: false
    
    - name: Deploy to Production
      run: |
        export ENVIRONMENT=prod
        ./deploy.sh prod ${{ env.AWS_REGION }}
    
    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: 'Trading Squad Dashboard deployed to Production'
        webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
